<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic 3D Masterpiece</title>
    <style>
        /* মূল স্টাইল */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505; /* ডিপ ব্ল্যাক ব্যাকগ্রাউন্ড */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* কন্টেইনার */
        .game-container {
            text-align: center;
            z-index: 10;
        }

        /* গ্লিচ এবং গ্রেডিয়েন্ট টাইটেল */
        .master-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00cc, #3333ff, #00ffcc, #ff00cc);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
            letter-spacing: 5px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 204, 0.3));
        }

        @keyframes flow {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        .tagline {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* নিয়ন সবুজ বোতাম */
        .start-btn {
            background: transparent;
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }

        .start-btn:hover {
            background: #2ecc71;
            color: #000;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.6);
        }

        .start-btn:active {
            transform: scale(0.9);
        }

        /* লোডিং স্ক্রিন */
        #loading-screen {
            display: none;
        }

        .loader-wrapper {
            width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            height: 20px;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #a9ff00);
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            transition: width 0.1s linear;
        }

        .counter {
            margin-top: 15px;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            color: #2ecc71;
        }

        /* অভিনন্দন বার্তা */
        #victory-screen {
            display: none;
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .thanks-note {
            margin-top: 20px;
            font-style: italic;
            color: #00ffcc;
        }

        /* ব্যাকগ্রাউন্ড অ্যানিমেশন (ঐচ্ছিক) */
        .bg-dots {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #ffffff11 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-dots"></div>

    <div id="main-menu" class="game-container">
        <h1 class="master-title">3D MASTERPIECE</h1>
        <p class="tagline">Ready to start the game?</p>
        <button class="start-btn" onclick="initGame()">Start Game</button>
    </div>

    <div id="loading-screen" class="game-container">
        <div class="loader-wrapper">
            <div id="progress" class="progress-bar"></div>
        </div>
        <div id="status" class="counter">INITIALIZING: 0 / 100</div>
    </div>

    <div id="victory-screen" class="game-container">
        <h1 class="master-title">🎉 Congratulations! 🎉</h1>
        <p class="tagline">আপনি সফলভাবে গেমটি সম্পন্ন করেছেন!</p>
        <p class="thanks-note">আমাদের সাথে খেলার জন্য আপনাকে অসংখ্য ধন্যবাদ, প্রিয় খেলোয়াড়।</p>
    </div>

    <script>
        function initGame() {
            // মেনু লুকানো
            document.getElementById('main-menu').style.display = 'none';
            // লোডার দেখানো
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.display = 'block';

            let count = 0;
            const progressBar = document.getElementById('progress');
            const statusText = document.getElementById('status');
            const victoryScreen = document.getElementById('victory-screen');

            // লোডিং লজিক
            const timer = setInterval(() => {
                count++;
                progressBar.style.width = count + '%';
                statusText.innerText = `LOADING DATA: ${count} / 100`;

                if (count >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        victoryScreen.style.display = 'block';
                    }, 500); // ১০০ হওয়ার পর সামান্য বিরতি
                }
            }, 40); // লোডিং স্পিড
        }
    </script>
</body>
</html>
