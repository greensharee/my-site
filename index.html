<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic 3D Masterpiece</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-green: #2ecc71;
            --gradient: linear-gradient(45deg, #ff3366, #ff00ff, #00ffff, #ff3366);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Gradient Text Animation */
        .gradient-title {
            font-size: 4rem;
            font-weight: 800;
            background: var(--gradient);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 5s ease infinite;
            margin-bottom: 10px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Button Styling & Animation */
        .btn-start {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(46, 204, 113, 0.5);
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        /* Loading Container */
        #loader-container {
            display: none;
            width: 300px;
            margin: 20px auto;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-green);
            transition: width 0.1s linear;
        }

        /* Success Message */
        #congrats-message {
            display: none;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 class="gradient-title">3D MASTERPIECE</h1>
        <p class="subtitle">Ready to start the game?</p>
        <button class="btn-start" onclick="startGame()">Start Game</button>
    </div>

    <div id="loader-container">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="page-count">Loading page: 0 / 100</p>
    </div>

    <div id="congrats-message">
        <h1 class="gradient-title">🎉 Congratulations! 🎉</h1>
        <p class="subtitle">Thank you for playing, Brave Adventurer!</p>
    </div>

    <script>
        function startGame() {
            const mainUi = document.getElementById('main-ui');
            const loader = document.getElementById('loader-container');
            const fill = document.getElementById('progress-fill');
            const countText = document.getElementById('page-count');
            const congrats = document.getElementById('congrats-message');

            // Hide Main UI
            mainUi.style.display = 'none';
            // Show Loader
            loader.style.display = 'block';

            let progress = 0;
            const totalPages = 100;

            const interval = setInterval(() => {
                progress++;
                fill.style.width = progress + '%';
                countText.innerText = `Loading page: ${progress} / ${totalPages}`;

                if (progress >= totalPages) {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    congrats.style.display = 'block';
                }
            }, 30); // Speed of loading
        }
    </script>

</body>
</html>
